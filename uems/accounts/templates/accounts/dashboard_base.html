{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fb;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h5 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .nav-link {
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255,255,255,0.2);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* TOPBAR */
        .topbar {
            height: 75px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .welcome {
            font-size: 16px;
            font-weight: 700;
            color: #0d6efd;
        }

        .subtext {
            font-size: 13px;
            color: gray;
        }

        /* CONTENT */
        .content {
            padding: 30px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* ================================
           GLOBAL ADMIN TABLE FIX (IMPORTANT)
           ================================ */
        table.admin-table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
        }

        table.admin-table th,
        table.admin-table td {
            padding: 12px 10px;
            text-align: center;
            vertical-align: middle !important;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        table.admin-table tbody tr:hover {
            background: #f6f9ff;
        }

        /* Proposal layout stability */
        .proposal-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-1px);
            transition: 0.2s ease;
        }

        @media (max-width: 768px) {
            table.admin-table {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h5>{{ role|title }}</h5>

        {% if role == 'organizer' %}
            <a href="{% url 'events:dashboard' %}" class="nav-link active">
                <i class="fa fa-home"></i> Dashboard
            </a>
        {% else %}
            <a href="{% url 'events:my_events' %}" class="nav-link active">
                <i class="fa fa-calendar"></i> My Events
            </a>
        {% endif %}

        <div class="mt-auto">
            <a href="{% url 'logout' %}" class="nav-link text-danger">
                <i class="fa fa-sign-out-alt"></i> Logout
            </a>
        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <div class="welcome">
                    Welcome, {{ request.user.username }}
                </div>
                <div class="subtext">
                    {{ role|title }} • Event Management System
                </div>
            </div>

            <div>
                <button onclick="history.back()" class="btn btn-outline-secondary btn-sm">Back</button>
                <a href="{% url 'events:dashboard' %}" class="btn btn-primary btn-sm">Dashboard</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Logout</a>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>

</div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
