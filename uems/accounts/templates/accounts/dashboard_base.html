{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; font-family: 'Segoe UI'; background: #f4f6fb; }
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h4 { margin-bottom: 30px; }

        .nav-link {
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.2);
        }

        .main { flex: 1; display: flex; flex-direction: column; }

        /* TOPBAR PROFESSIONAL */
        .topbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .content { padding: 30px; }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4>Student</h4>

        <!-- ✅ ONLY MY EVENTS -->
        <a href="{% url 'events:my_events' %}" class="nav-link active">
            <i class="fa fa-calendar"></i> My Events
        </a>

        <div class="mt-auto">
            <a href="{% url 'logout' %}" class="nav-link text-danger">
                <i class="fa fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">

            <!-- LEFT (BACK BUTTON) -->
            <div class="topbar-left">
                <button onclick="history.back()" class="btn btn-light border">
                    <i class="fa fa-arrow-left"></i>
                </button>

                <span class="fw-semibold">
                    {{ request.user.first_name|default:request.user.username }}
                </span>
            </div>

            <!-- RIGHT (PROFESSIONAL NAV) -->
            <div class="topbar-right">

                <a href="{% url 'events:available_events' %}" class="btn btn-outline-primary btn-sm">
                    Browse Events
                </a>

                <a href="{% url 'events:my_events' %}" class="btn btn-primary btn-sm">
                    Dashboard
                </a>

                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">
                    Logout
                </a>

            </div>

        </div>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>

</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
