<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UEMS - Accounts</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            font-family:'Segoe UI', sans-serif;
            background:linear-gradient(135deg,#0d6efd,#4f9cff);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0;
        }

        .card-box{
            background:white;
            padding:40px 30px;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            text-align:center;
            width:100%;
            max-width:420px;
        }

        .title{
            font-size:26px;
            font-weight:700;
            color:#0d6efd;
            margin-bottom:10px;
        }

        .subtitle{
            font-size:14px;
            color:#6c757d;
            margin-bottom:30px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            border-radius:10px;
            font-weight:600;
        }

        .btn-space{
            margin-bottom:12px;
        }

    </style>

</head>

<body>

<div class="card-box">

    <div class="title">
        UEMS
    </div>

    <div class="subtitle">
        University Event Management System
    </div>

    <a href="{% url 'register' %}"
       class="btn btn-primary btn-custom btn-space">

        Register

    </a>

    <a href="{% url 'login' %}"
       class="btn btn-outline-primary btn-custom">

        Login

    </a>

</div>

</body>
</html>
