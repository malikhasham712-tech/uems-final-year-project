<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}UEMS Project{% endblock %}</title>

    {% load static %}

    <!-- 1️⃣ Bootstrap CSS (add in head) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 2️⃣ Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/custom.css' %}">

    {% block extrastyle %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="bg-primary text-white p-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">University Event Management System</h1>
            <nav>
                <a href="{% url 'my_events' %}" class="text-white me-3">My Events</a>
                {% if request.user.is_superuser %}
                    <a href="{% url 'my_proposals' %}" class="text-white me-3">My Proposals</a>
                {% endif %}
                <a href="{% url 'logout' %}" class="text-white">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Main content -->
    <main class="container mb-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-light text-center p-3">
        <p class="mb-0">&copy; 2026 UEMS</p>
    </footer>

    <!-- 3️⃣ Bootstrap JS (add before closing body) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extrascript %}{% endblock %}
</body>
</html>
