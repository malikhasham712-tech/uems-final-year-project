<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}UEMS{% endblock %}</title>

    {% load static %}

    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .navbar {
            background-color: #1e293b;
        }

        .navbar-brand, .nav-link {
            color: white !important;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .footer {
            text-align: center;
            padding: 15px;
            margin-top: 40px;
            color: gray;
        }
    </style>

    {% block extrastyle %}{% endblock %}
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
    UEMS <small style="font-size: 12px;">(University Event Management System)</small>
    </a>

        <div>
            {% if request.user.is_authenticated %}
                <a class="nav-link d-inline" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link d-inline" href="{% url 'my_events' %}">My Events</a>
                <a class="nav-link d-inline" href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a class="nav-link d-inline" href="{% url 'login' %}">Login</a>
                <a class="nav-link d-inline" href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- ✅ CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- ✅ FOOTER -->
<div class="footer">
    © 2026 University Event Management System
</div>

</body>
</html>
