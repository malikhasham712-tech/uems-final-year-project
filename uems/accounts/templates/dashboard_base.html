{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            padding-top: 20px;
        }

        .sidebar h4 {
            color: white;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #334155;
            color: #fff;
        }

        .active-link {
            background: #0d6efd !important;
            color: white !important;
        }

        .content {
            margin-left: 260px;
            padding: 30px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .topbar {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4 class="text-center mb-4">UEMS</h4>

    {% if request.user.is_superuser or request.user.profile.role == 'organizer' %}
        <a href="{% url 'my_events' %}" class="active-link">
            <i class="fa fa-calendar"></i> My Events
        </a>
    {% else %}
        <a href="{% url 'student_events' %}" class="active-link">
            <i class="fa fa-calendar"></i> Events
        </a>
    {% endif %}

    <a href="{% url 'logout' %}">
        <i class="fa fa-sign-out-alt"></i> Logout
    </a>

</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOP BAR -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Welcome, {{ request.user.username }}</h5>
    </div>

    {% block content %}{% endblock %}

</div>

</body>
</html>
