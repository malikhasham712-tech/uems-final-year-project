<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{{ event.name }} QR Code</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #f4f6fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .qr-card {
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: relative;
        }

        .print-btn {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .event-title {
            font-size: 26px;
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 8px;
        }

        .event-meta {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 20px;
        }

        /* QR RESPONSIVE FIX */
        .qr-image {
            width: 100%;
            max-width: 280px;
            height: auto;
            object-fit: contain;
            margin: 20px auto;
        }

        .subtitle {
            font-size: 16px;
            color: #6c757d;
            margin-top: 10px;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {

            .qr-card {
                padding: 20px;
                border-radius: 12px;
            }

            .event-title {
                font-size: 20px;
            }

        }

        /* PRINT MODE */
        @media print {

            body {
                background: white;
            }

            body * {
                visibility: hidden;
            }

            .qr-card, .qr-card * {
                visibility: visible;
            }

            .qr-card {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                box-shadow: none;
                border: none;
                width: 100%;
                padding: 20px;
            }

            .print-btn {
                display: none !important;
            }

            @page {
                size: A4;
                margin: 0;
            }

            .qr-image {
                max-width: 320px;
                width: 100%;
                height: auto;
            }

        }

    </style>
</head>

<body>

<div class="page-wrapper">

    <div class="qr-card">

        <!-- PRINT BUTTON -->
        <button onclick="window.print()" class="btn btn-dark btn-sm print-btn">
            Print
        </button>

        <!-- TITLE -->
        <div class="event-title">
            {{ event.name }}
        </div>

        <!-- META -->
        <div class="event-meta">

            {% if event.date %}
                <div><strong>Date:</strong> {{ event.date|date:"d M Y" }}</div>
            {% endif %}

            {% if event.venue %}
                <div><strong>Venue:</strong> {{ event.venue }}</div>
            {% endif %}

        </div>

        <!-- QR -->
        <img src="data:image/png;base64,{{ qr_image }}"
             class="qr-image"
             alt="QR Code">

        <!-- TEXT -->
        <div class="subtitle">
            Scan this QR code to mark attendance
        </div>

        <!-- OPTIONAL URL -->
        {% if attendance_url %}
        <div class="text-muted small mt-3">
            {{ attendance_url }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
