<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QR Code</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#eef2f7;
            font-family: 'Segoe UI', sans-serif;
        }

        .page-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .qr-card{
            width:100%;
            max-width:520px;
            background:#fff;
            padding:40px;
            border-radius:16px;
            text-align:center;
            position:relative;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        .print-btn{
            position:absolute;
            top:15px;
            right:15px;
        }

        .event-title{
            font-weight:700;
            color:#0d6efd;
            margin-bottom:10px;
        }

        .event-meta{
            font-size:15px;
            color:#6c757d;
            margin-bottom:20px;
        }

        .qr-image{
            width:280px;
            height:280px;
            margin:20px auto;
        }

        .subtitle{
            font-size:18px;
            color:#6c757d;
            margin-top:15px;
        }

        /* ======================
           PRINT STYLING (A4)
        =======================*/

        @media print {

            body{
                background:white;
            }

            body * {
                visibility: hidden;
            }

            .qr-card, .qr-card * {
                visibility: visible;
            }

            .qr-card{
                position:absolute;
                top:50%;
                left:50%;
                transform:translate(-50%, -50%);
                box-shadow:none;
                border:none;
                width:100%;
            }

            .print-btn{
                display:none !important;
            }

            @page {
                size: A4;
                margin: 0;
            }

            .event-title {
                font-size: 26px;
            }

            .event-meta {
                font-size: 18px;
            }

        }

    </style>
</head>

<body>

<div class="page-wrapper">

    <div class="qr-card">

        <!-- PRINT BUTTON -->
        <button onclick="window.print()"
                class="btn btn-dark btn-sm print-btn">
            Print
        </button>

        <!-- EVENT NAME -->
        <div class="event-title">
            {{ event.name }}
        </div>

        <!-- EVENT DATE + VENUE -->
        <div class="event-meta">

            {% if event.date %}
                <div><strong>Date:</strong> {{ event.date }}</div>
            {% endif %}

            {% if event.venue %}
                <div><strong>Venue:</strong> {{ event.venue }}</div>
            {% endif %}

        </div>

        <!-- QR IMAGE -->
        <img src="data:image/png;base64,{{ qr_image }}"
             class="qr-image"
             alt="QR Code">

        <!-- TEXT -->
        <div class="subtitle">
            Scan this QR to mark attendance
        </div>

        <!-- URL -->
        <div class="text-muted small mt-3">
            {{ attendance_url }}
        </div>

    </div>

</div>

</body>
</html>
