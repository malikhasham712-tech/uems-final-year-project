<!DOCTYPE html>
<html>
<head>
    <title>My Events - UEMS</title>
</head>
<body>

<h2>My Events</h2>

{% if events %}
    <ul>
    {% for event in events %}
        <li>
            {{ event.name }} - {{ event.status }}
            <!-- Link to submit proposal for this event -->
            <a href="{% url 'submit_proposal' event.id %}">Submit Proposal</a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>You have no events yet.</p>
{% endif %}

<a href="{% url 'dashboard' %}">Back to Dashboard</a>

</body>
</html>
