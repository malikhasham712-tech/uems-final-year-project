{% extends "accounts/dashboard_base.html" %}

{% block title %}Notification Details{% endblock %}

{% block content %}

<div class="box">

    <div class="card p-4 shadow-sm">

        <!-- MESSAGE -->
        <div class="mb-4">
            <p class="mb-1 fw-semibold text-muted">Message</p>
            <p class="fs-6 mb-0">
                {{ notif.message }}
            </p>
        </div>

        <!-- DATE -->
        <div>
            <p class="mb-1 fw-semibold text-muted">Date</p>
            <p class="text-muted mb-0">
                {{ notif.created_at|date:"d M Y, h:i A" }}
            </p>
        </div>

    </div>

</div>

{% endblock %}
