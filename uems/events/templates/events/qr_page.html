<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ event.name }} QR Code</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6fb;
            font-family:'Segoe UI', sans-serif;
        }

        .qr-card{
            max-width:700px;
            margin:auto;
            margin-top:50px;
            background:white;
            border-radius:16px;
            padding:40px;
            box-shadow:0 4px 18px rgba(0,0,0,0.08);
        }

        .qr-image{
            width:320px;
            height:320px;
            object-fit:contain;
        }

        @media print {

            .no-print{
                display:none !important;
            }

            body{
                background:white;
            }

            .qr-card{
                box-shadow:none;
                margin-top:0;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <div class="qr-card text-center">

        <div class="d-flex justify-content-between align-items-center mb-4 no-print">

            <h3 class="fw-bold text-primary mb-0">
                Attendance QR
            </h3>

            <button onclick="window.print()" class="btn btn-dark">
                Print QR
            </button>

        </div>

        <h2 class="fw-bold mb-2">
            {{ event.name }}
        </h2>

        <p class="text-muted mb-4">
            Scan this QR code to mark attendance
        </p>

        <img src="data:image/png;base64,{{ qr_image }}"
             class="qr-image mb-4">

        <div class="text-muted">
            Event ID: {{ event.id }}
        </div>

    </div>

</div>

</body>
</html>
