<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ event.name }} QR Code</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6fb;
            font-family:'Segoe UI', sans-serif;
            margin:0;
            padding:0;
        }

        /* CENTER WRAPPER */
        .qr-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        /* CARD */
        .qr-card{
            width:100%;
            max-width:700px;
            background:white;
            border-radius:16px;
            padding:32px;
            box-shadow:0 4px 18px rgba(0,0,0,0.08);
            text-align:center;
        }

        /* QR IMAGE RESPONSIVE */
        .qr-image{
            width:100%;
            max-width:320px;
            height:auto;
            object-fit:contain;
            margin-bottom:20px;
        }

        /* HEADER */
        .header-title{
            font-weight:700;
            color:#0d6efd;
            margin-bottom:10px;
        }

        .subtitle{
            color:#6c757d;
            margin-bottom:20px;
        }

        /* MOBILE FIX */
        @media(max-width:768px){

            .qr-card{
                padding:20px;
                border-radius:12px;
            }

            .header-title{
                font-size:20px;
            }

            .qr-image{
                max-width:240px;
            }
        }

        /* PRINT MODE */
        @media print {

            body{
                background:white;
            }

            .no-print{
                display:none !important;
            }

            .qr-card{
                box-shadow:none;
                border:none;
                margin:0;
                padding:0;
            }

            @page {
                margin: 0;
            }
        }

    </style>
</head>

<body>

<div class="qr-wrapper">

    <div class="qr-card">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3 no-print">

            <h4 class="fw-bold text-primary mb-0">
                Attendance QR
            </h4>

            <button onclick="window.print()" class="btn btn-dark btn-sm">
                Print
            </button>

        </div>

        <!-- EVENT NAME -->
        <div class="header-title">
            {{ event.name }}
        </div>

        <!-- SUBTITLE -->
        <div class="subtitle">
            Scan this QR code to mark attendance
        </div>

        <!-- QR IMAGE -->
        <img src="data:image/png;base64,{{ qr_image }}"
             class="qr-image">

        <!-- EVENT ID -->
        <div class="text-muted small">
            Event ID: {{ event.id }}
        </div>

    </div>

</div>

</body>
</html>
