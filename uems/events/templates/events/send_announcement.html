{% extends "accounts/dashboard_base.html" %}

{% block title %}Send Announcement{% endblock %}

{% block content %}

<div class="box">

    <div class="card shadow-sm border-0 p-3">

        <h4 class="text-primary mb-3">Send Announcement</h4>

        <form method="POST">
            {% csrf_token %}

            <label class="form-label">Select Event</label>
            <select name="event_id" class="form-select mb-3" required>
                {% for event in events %}
                    <option value="{{ event.id }}">{{ event.name }}</option>
                {% endfor %}
            </select>

            <label class="form-label">Message</label>
            <textarea name="message" class="form-control mb-3" rows="5" required></textarea>

            <button type="submit" class="btn btn-primary w-100">
                Send Announcement
            </button>

        </form>

    </div>

</div>

{% endblock %}
