{% extends "accounts/dashboard_base.html" %}

{% block title %}Submit Proposal{% endblock %}

{% block content %}

<div class="d-flex justify-content-center">

<div class="box" style="max-width:780px; width:100%;">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-primary text-white">
            <h6 class="mb-0">Submit Proposal — {{ event.name }}</h6>
        </div>

        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Venue</label>
                    <input type="text" name="proposed_venue" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="details" class="form-control" rows="3" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Requirements</label>
                    <textarea name="requirements" class="form-control" rows="3" required></textarea>
                </div>

                <div class="d-flex justify-content-between gap-2 flex-wrap">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary w-100 w-md-auto">
                        Back
                    </a>

                    <button type="submit" class="btn btn-success w-100 w-md-auto">
                        Submit Proposal
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
