{% extends "admin/base_site.html" %}

{% block content %}

<style>

/* CONTAINER */
.container {
    padding: 24px;
    max-width: 1100px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: #111827;
    border-radius: 8px;
}

/* TITLE */
.title {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

/* BUTTONS */
.btn {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    text-decoration: none;
    font-weight: 600;
}

.btn-add {
    background: #16a34a;
    color: white;
}

.btn-back {
    background: #374151;
    color: white;
}

/* CARD WRAPPER */
.card-wrapper {
    margin-top: 20px;
}

/* CARD */
.card {
    display: block;
    padding: 18px;
    background: #1f2937;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}

/* HOVER */
.card:hover {
    background: #374151;
}

/* REMOVE DJANGO TITLE */
h1 {
    display: none;
}

</style>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="title">
            Feedback Report
        </div>

        <div style="display:flex; gap:8px;">

            <a href="{% url 'admin:events_eventreport_add' %}" class="btn btn-add">
                + Add Report
            </a>

            <a href="{% url 'admin:index' %}" class="btn btn-back">
                ← Back
            </a>

        </div>

    </div>

    <!-- CARD -->
    <div class="card-wrapper">

        <a href="{% url 'admin:eventreport_feedback_list' %}" class="card">
            Feedback Report →
        </a>

    </div>

</div>

{% endblock %}
