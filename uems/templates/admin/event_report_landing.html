{% extends "admin/base_site.html" %}

{% block content %}

<style>

/* PAGE WRAPPER */
.container {
    max-width: 1100px;
    padding: 24px;
    color: #111827;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 14px;
    background: #111827;
    border-radius: 8px;
}

/* TITLE */
.title {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

/* BUTTONS */
.btn {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;
}

.btn-add {
    background: #16a34a;
    color: white;
}

.btn-back {
    background: #374151;
    color: white;
}

/* CARD */
.card {
    margin-top: 20px;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 18px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

/* LINK INSIDE CARD */
.card a {
    display: block;
    text-decoration: none;
    color: white;
    font-weight: 600;
    padding: 18px;
    background: #111827;
    border-radius: 8px;
}

/* REMOVE DEFAULT H1 */
h1 {
    display: none !important;
}

</style>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <div class="title">
            Feedback Report
        </div>

        <div style="display:flex; gap:8px;">

            <!-- ADD REPORT -->
            <a href="{% url 'admin:events_eventreport_add' %}" class="btn btn-add">
                + Add Report
            </a>

            <!-- BACK -->
            <a href="{% url 'admin:index' %}" class="btn btn-back">
                ← Back
            </a>

        </div>

    </div>

    <!-- ONLY ONE MODULE CARD -->
    <div class="card">

        <!-- THIS GOES TO STEP 2 (we created in admin.py: feedback_list_view) -->
        <a href="{% url 'admin:eventreport_feedback_list' %}">
            Feedback Report →
        </a>

    </div>

</div>

{% endblock %}
