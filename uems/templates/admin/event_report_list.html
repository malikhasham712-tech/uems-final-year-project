{% extends "admin/base_site.html" %}

{% block content %}

<style>
    .container {
        padding: 20px;
        max-width: 1000px;
    }

    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .title {
        font-size: 22px;
        font-weight: 600;
    }

    .back-btn {
        padding: 6px 12px;
        background: #6b7280;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 13px;
    }

    .back-btn:hover {
        background: #4b5563;
    }

    .table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border: 1px solid #e5e7eb;
    }

    .table th {
        background: #111827;
        color: white;
        padding: 10px;
        text-align: left;
    }

    .table td {
        padding: 10px;
        border-bottom: 1px solid #e5e7eb;
    }

    .btn {
        padding: 6px 12px;
        background: #0d6efd;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 13px;
        display: inline-block;
    }

    .btn:hover {
        background: #084298;
    }

    .empty {
        text-align: center;
        padding: 20px;
        color: #6b7280;
    }
</style>

<div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="title">Feedback Report</div>

        <!-- FIX: use Django admin index instead of hardcoded URL -->
        <a href="{% url 'admin:index' %}" class="back-btn">
            ← Back
        </a>
    </div>

    <!-- TABLE -->
    <table class="table">
        <thead>
            <tr>
                <th>Event Name</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for item in data %}
            <tr>
                <td>{{ item.event.name }}</td>
                <td>{{ item.event.date }}</td>
                <td>

                    <!-- FIX: use proper Django URL instead of item.url -->
                    <a href="{% url 'events:event_report_change' item.event.id %}" class="btn">
                        View Feedback Report
                    </a>

                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="empty">
                    No events available
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
