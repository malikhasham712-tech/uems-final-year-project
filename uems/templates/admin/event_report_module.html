{% extends "admin/base_site.html" %}

{% block content %}

<style>

.container {
    padding: 20px;
    max-width: 1100px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: #111827;
    border-radius: 8px;
}

.title {
    font-size: 18px;
    font-weight: 700;
    color: white;
}

.card {
    background: #1f2937;
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card h3 {
    color: white;
    margin: 0;
}

.btn {
    padding: 8px 12px;
    background: #2563eb;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
}

.btn-back {
    padding: 8px 12px;
    background: #374151;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
}

</style>

<div class="container">

    <div class="header">
        <div class="title">Event Reports</div>

        <a href="{% url 'admin:index' %}" class="btn-back">
            ← Back
        </a>
    </div>

    <!-- FEEDBACK REPORT -->
    <div class="card">
        <h3>Feedback Report</h3>
        <a href="{% url 'admin:eventreport_feedback_list' %}" class="btn">
            Open
        </a>
    </div>

    <!-- ATTENDANCE REPORT (IMPORTANT FIX) -->
    <div class="card">
        <h3>Attendance Report</h3>
        <a href="{% url 'admin:attendance_report_list' %}" class="btn">
            Open
        </a>
    </div>

</div>

{% endblock %}
